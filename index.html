<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QyxnoraCore</title>

<style>
body{
background:#0b1020;
color:white;
font-family:Arial,sans-serif;
padding:15px;
max-width:900px;
margin:auto;
}

h1{
text-align:center;
font-size:42px;
color:#00ffcc;
text-shadow:0 0 5px #00ffcc,0 0 10px #00ffcc,0 0 20px #00ffcc,0 0 40px #00ffcc;
}

.watermark-box{
position:relative;
margin-bottom:15px;
}

.watermark-box::before{
content:"";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
height:320px;
background:url('logo.png') center center no-repeat;
background-size:contain;
opacity:0.35;
pointer-events:none;
z-index:1;
}

textarea{
width:100%;
height:220px;
padding:12px;
border:none;
border-radius:12px;
font-size:16px;
box-sizing:border-box;
position:relative;
z-index:2;
background:rgba(255,255,255,0.96);
}

input{
padding:12px;
border:none;
border-radius:10px;
font-size:16px;
width:100%;
box-sizing:border-box;
margin-bottom:10px;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
font-size:16px;
cursor:pointer;
margin:5px;
}

.green{
background:#28a745;
color:white;
}

.blue{
background:#007bff;
color:white;
}

.red{
background:#dc3545;
color:white;
}

#count{
font-size:22px;
font-weight:bold;
margin:15px 0;
text-align:center;
color:#00ffcc;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
background:#1b1f2e;
padding:18px;
margin-top:10px;
border-radius:15px;
word-break:break-all;
}

.copyBtn{
background:white;
color:black;
font-weight:bold;
}

.btns{
display:flex;
flex-wrap:wrap;
gap:5px;
}
</style>
</head>

<body>

<h1>QyxnoraCore</h1>

<div class="watermark-box">
<textarea id="numbers" placeholder="Paste Lamix Data Here..."></textarea>
</div>

<input id="removePrefix" placeholder="Remove Prefix (Example: 213)">
<button class="green" onclick="removePrefix()">Remove Prefix</button>

<input id="addPrefix" placeholder="Add Prefix (Example: 213)">
<button class="blue" onclick="addPrefix()">Add Prefix</button>

<div class="btns">
<button class="blue" onclick="addPlus()">Add +</button>
<button class="red" onclick="removePlus()">Remove +</button>
<button class="blue" onclick="copyAll()">Copy All</button>
</div>

<div id="count">Total: 0</div>

<div id="result"></div>

<script>

let current=[];

function getNumbers(){

let text=document.getElementById("numbers").value;

let matches=text.match(/\d{8,15}/g);

return matches || [];

}

function render(){

let result=document.getElementById("result");

result.innerHTML="";

current.forEach(num=>{

let row=document.createElement("div");

row.className="row";

row.innerHTML=`
<span>${num}</span>
<button class="copyBtn" onclick="copyNumber('${num}')">📋 Copy</button>
`;

result.appendChild(row);

});

document.getElementById("count").innerText=
"Total: "+current.length;

}

function loadNumbers(){

current=getNumbers();

render();

}

function removePrefix(){

if(current.length===0){
current=getNumbers();
}

let prefix=document.getElementById("removePrefix").value.trim();

if(!prefix) return;

current=current.map(num=>{

let clean=num.replace(/^\+/,'');

if(clean.startsWith(prefix)){
return clean.slice(prefix.length);
}

return clean;

});

render();

}

function addPrefix(){

if(current.length===0){
current=getNumbers();
}

let prefix=document.getElementById("addPrefix").value.trim();

if(!prefix) return;

current=current.map(num=>prefix+num);

render();

}

function addPlus(){

if(current.length===0){
current=getNumbers();
}

current=current.map(num=>
num.startsWith("+") ? num : "+"+num
);

render();

}

function removePlus(){

if(current.length===0){
current=getNumbers();
}

current=current.map(num=>
num.replace(/^\+/,'')
);

render();

}

function copyNumber(num){

navigator.clipboard.writeText(num);

let index=current.indexOf(num);

if(index>-1){
current.splice(index,1);
}

render();

}

function copyAll(){

if(current.length===0){
current=getNumbers();
}

navigator.clipboard.writeText(current.join("\n"));

alert("All Numbers Copied");

}

document.getElementById("numbers").addEventListener("input",loadNumbers);

</script>

</body>
</html>
