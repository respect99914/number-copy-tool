<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Number Copy Tool Pro</title>

<style>
body{
background:#111;
color:#fff;
font-family:Arial;
padding:15px;
max-width:900px;
margin:auto;
}

h2{
text-align:center;
}

textarea{
width:100%;
height:180px;
padding:10px;
border-radius:8px;
font-size:16px;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
}

button{
padding:10px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:15px;
}

.green{
background:#28a745;
color:white;
}

.blue{
background:#007bff;
color:white;
}

.red{
background:#dc3545;
color:white;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
background:#222;
padding:10px;
margin-top:6px;
border-radius:8px;
}

.count{
margin-top:10px;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Number Copy Tool Pro</h2>

<textarea id="numbers" placeholder="Paste numbers here"></textarea>

<input id="prefix" placeholder="Country Code (216,244,880...)">

<br>

<button class="green" onclick="generate()">Generate</button>
<button class="blue" onclick="copyAll()">Copy All</button>
<button class="red" onclick="removeDuplicates()">Remove Duplicates</button>

<div class="count" id="count">
Total: 0
</div>

<div id="result"></div>

<script>

let current=[];

function getNumbers(){

return document.getElementById("numbers")
.value
.split(/\s+/)
.filter(x=>x.trim()!="");

}

function generate(){

let prefix=document.getElementById("prefix").value.trim();

current=getNumbers().map(num=>{

num=num.replace("+","");

if(prefix && num.startsWith(prefix)){
num=num.slice(prefix.length);
}

return num;

});

render();

}

function render(){

let result=document.getElementById("result");

result.innerHTML="";

current.forEach(num=>{

let row=document.createElement("div");

row.className="row";

row.innerHTML=`
<span>${num}</span>
<button class="blue"
onclick="copyNumber('${num}')">
Copy
</button>
`;

result.appendChild(row);

});

document.getElementById("count")
.innerText="Total: "+current.length;

}

function copyNumber(num){

navigator.clipboard.writeText(num);

alert("Copied: "+num);

}

function copyAll(){

navigator.clipboard.writeText(
current.join("\n")
);

alert("All numbers copied");

}

function removeDuplicates(){

current=[...new Set(current)];

render();

}

</script>

</body>
</html>
