<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Number Tool Pro</title>

<style>
body{
background:#0f1117;
color:white;
font-family:Arial,sans-serif;
padding:15px;
max-width:900px;
margin:auto;
}

h1{
text-align:center;
}

textarea{
width:100%;
height:180px;
padding:12px;
border-radius:10px;
font-size:16px;
border:none;
margin-bottom:10px;
}

input{
padding:10px;
border-radius:8px;
border:none;
margin:5px;
width:180px;
}

button{
padding:10px 15px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
font-size:14px;
}

.green{background:#28a745;color:white;}
.blue{background:#007bff;color:white;}
.red{background:#dc3545;color:white;}

#count{
margin-top:10px;
font-size:20px;
font-weight:bold;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
background:#1c1f26;
padding:12px;
margin-top:8px;
border-radius:10px;
word-break:break-all;
}

.copyBtn{
background:white;
color:black;
}

.controls{
margin-top:10px;
margin-bottom:10px;
}
</style>
</head>

<body>

<h1>Number Tool Pro</h1>

<textarea id="numbers" placeholder="Paste numbers here..."></textarea>

<div class="controls">

<input id="removePrefix" placeholder="Remove Prefix">

<button class="green" onclick="removePrefix()">
Remove Prefix
</button>

<br>

<input id="addPrefix" placeholder="Add Prefix">

<button class="blue" onclick="addPrefix()">
Add Prefix
</button>

<button class="blue" onclick="addPlus()">
Add +
</button>

<button class="red" onclick="removePlus()">
Remove +
</button>

<button class="blue" onclick="copyAll()">
Copy All
</button>

</div>

<div id="count">Total: 0</div>

<div id="result"></div>

<script>

let current=[];

function getNumbers(){
return document.getElementById("numbers")
.value
.split(/\s+/)
.filter(x=>x.trim()!="");
}

function render(){

let result=document.getElementById("result");

result.innerHTML="";

current.forEach(num=>{

let row=document.createElement("div");

row.className="row";

row.innerHTML=`
<span>${num}</span>
<button class="copyBtn"
onclick="copyNumber('${num}')">
📋 Copy
</button>
`;

result.appendChild(row);

});

document.getElementById("count").innerText=
"Total: "+current.length;

}

function loadNumbers(){

current=getNumbers();

render();

}

function removePrefix(){

if(current.length===0){
current=getNumbers();
}

let prefix=document.getElementById("removePrefix")
.value.trim();

if(!prefix) return;

current=current.map(num=>{

let clean=num.replace(/^\+/,'');

if(clean.startsWith(prefix)){
return clean.slice(prefix.length);
}

return clean;

});

render();

}

function addPrefix(){

if(current.length===0){
current=getNumbers();
}

let prefix=document.getElementById("addPrefix")
.value;

if(!prefix) return;

current=current.map(num=>prefix+num);

render();

}

function addPlus(){

if(current.length===0){
current=getNumbers();
}

current=current.map(num=>
num.startsWith("+") ? num : "+"+num
);

render();

}

function removePlus(){

if(current.length===0){
current=getNumbers();
}

current=current.map(num=>
num.replace(/^\+/,'')
);

render();

}

function copyNumber(num){

navigator.clipboard.writeText(num);

alert("Copied: "+num);

}

function copyAll(){

if(current.length===0){
current=getNumbers();
}

navigator.clipboard.writeText(
current.join("\n")
);

alert("All copied");

}

document.getElementById("numbers")
.addEventListener("input",loadNumbers);

</script>

</body>
</html>
