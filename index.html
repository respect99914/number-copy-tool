<!DOCTYPE html><html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QyxnoraCore Pro</title><style>

body{
background:#071124;
font-family:Arial,sans-serif;
color:white;
padding:15px;
max-width:900px;
margin:auto;
}

h1{
text-align:center;
font-size:48px;
color:#00ffd5;
text-shadow:0 0 10px #00ffd5,0 0 20px #00ffd5,0 0 40px #00ffd5;
margin-bottom:20px;
}

.watermark-box{
position:relative;
margin-bottom:15px;
}

.watermark-box::before{
content:"";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:320px;
height:320px;
background:url('logo.png') center center no-repeat;
background-size:contain;
opacity:0.35;
pointer-events:none;
}

textarea{
width:100%;
height:260px;
padding:15px;
border:none;
border-radius:20px;
font-size:18px;
background:#ececec;
box-sizing:border-box;
}

input{
width:100%;
padding:14px;
border:none;
border-radius:14px;
font-size:17px;
margin-top:12px;
margin-bottom:10px;
box-sizing:border-box;
}

button{
padding:14px 20px;
border:none;
border-radius:14px;
font-size:17px;
cursor:pointer;
margin:5px;
font-weight:bold;
}

.green{background:#28a745;color:white;}
.blue{background:#007bff;color:white;}
.red{background:#dc3545;color:white;}

.btns{
display:flex;
flex-wrap:wrap;
gap:8px;
}

#count,#copied,#remaining{
text-align:center;
font-size:22px;
font-weight:bold;
margin-top:10px;
color:#00ffd5;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
background:#111c30;
padding:14px;
margin-top:10px;
border-radius:15px;
border:1px solid rgba(0,255,213,.2);
}

.number{
font-size:18px;
font-weight:bold;
}

.copyBtn{
background:#00bfff;
color:white;
}

.deleteBtn{
background:#ff3b4f;
color:white;
}

</style></head><body><h1>QyxnoraCore Pro</h1><div class="watermark-box">
<textarea id="numbers" placeholder="Paste Lamix Data Here..."></textarea>
</div><input id="removePrefix" placeholder="Remove Prefix (Example: 213)">
<button class="green" onclick="removePrefix()">Remove Prefix</button><input id="addPrefix" placeholder="Add Prefix (Example: 213)">
<button class="blue" onclick="addPrefix()">Add Prefix</button><div class="btns">
<button class="blue" onclick="addPlus()">Add +</button>
<button class="red" onclick="removePlus()">Remove +</button>
<button class="blue" onclick="copyAll()">Copy All</button>
</div><div id="count">Total: 0</div>
<div id="copied">Copied: 0</div>
<div id="remaining">Remaining: 0</div><div id="result"></div><script>

let current=[];
let copiedCount=0;
  function detectFlag(num){

if(num.startsWith("213")) return "🇩🇿";
if(num.startsWith("212")) return "🇲🇦";
if(num.startsWith("216")) return "🇹🇳";
if(num.startsWith("33")) return "🇫🇷";
if(num.startsWith("49")) return "🇩🇪";
if(num.startsWith("39")) return "🇮🇹";
if(num.startsWith("34")) return "🇪🇸";
if(num.startsWith("44")) return "🇬🇧";

return "🌍";

}

function getNumbers(){

let text=document.getElementById("numbers").value;

let matches=text.match(/+?\d{8,15}/g);

return matches || [];

}

function render(){

let result=document.getElementById("result");

result.innerHTML="";

current.forEach((num,index)=>{

let clean=num.replace("+","");

let flag=detectFlag(clean);

let row=document.createElement("div");

row.className="row";

row.innerHTML=`

<div class="number">${flag} ${num}</div><div>
<button class="copyBtn" onclick="copyNumber(${index})">📋</button>
<button class="deleteBtn" onclick="deleteNumber(${index})">❌</button>
</div>
`;result.appendChild(row);

});

document.getElementById("count").innerText=
"Total: "+current.length;

document.getElementById("copied").innerText=
"Copied: "+copiedCount;

document.getElementById("remaining").innerText=
"Remaining: "+current.length;

}

function loadNumbers(){

current=getNumbers();

render();

}

function removePrefix(){

if(current.length===0)
current=getNumbers();

let prefix=document.getElementById("removePrefix").value.trim();

if(!prefix) return;

current=current.map(num=>{

let clean=num.replace(/^+/,'');

if(clean.startsWith(prefix)){
return clean.slice(prefix.length);
}

return clean;

});

render();

}

function addPrefix(){

if(current.length===0)
current=getNumbers();

let prefix=document.getElementById("addPrefix").value.trim();

if(!prefix) return;

current=current.map(num=>{

let clean=num.replace(/^+/,'');

return prefix+clean;

});

render();

}

function addPlus(){

if(current.length===0)
current=getNumbers();

current=current.map(num=>
num.startsWith("+") ? num : "+"+num
);

render();

}

function removePlus(){

if(current.length===0)
current=getNumbers();

current=current.map(num=>
num.replace(/^+/,'')
);

render();

}

function copyNumber(index){

navigator.clipboard.writeText(current[index]);

current.splice(index,1);

copiedCount++;

render();

}

function deleteNumber(index){

current.splice(index,1);

render();

}

function copyAll(){

if(current.length===0)
current=getNumbers();

navigator.clipboard.writeText(
current.join("\n")
);

alert("All Numbers Copied");

}

document.getElementById("numbers")
.addEventListener("input",loadNumbers);

render();

</script></body>
</html>
