<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Number Tool Pro</title>

<style>
body{
background:#111;
color:white;
font-family:Arial;
padding:15px;
max-width:900px;
margin:auto;
}
textarea{
width:100%;
height:180px;
padding:10px;
border-radius:10px;
font-size:16px;
}
button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:8px;
cursor:pointer;
}
.green{background:#28a745;color:#fff;}
.blue{background:#007bff;color:#fff;}
.red{background:#dc3545;color:#fff;}

.row{
display:flex;
justify-content:space-between;
align-items:center;
background:#222;
padding:10px;
margin-top:5px;
border-radius:8px;
}

#count{
margin-top:10px;
font-size:18px;
font-weight:bold;
}
</style>
</head>

<body>

<h2>Number Tool Pro</h2>

<textarea id="numbers" placeholder="Paste numbers here"></textarea>

<br>

<button class="green" onclick="removeCountryCode()">Remove Country Code</button>
<button class="blue" onclick="addPlus()">Add +</button>
<button class="red" onclick="removePlus()">Remove +</button>
<button class="blue" onclick="copyAll()">Copy All</button>

<div id="count">Total: 0</div>

<div id="result"></div>

<script>

let current=[];

const countryCodes=[
"216","244","880","91","44","1","269"
];

function getNumbers(){
return document.getElementById("numbers")
.value
.split(/\s+/)
.filter(x=>x.trim()!="");
}

function render(){

let result=document.getElementById("result");

result.innerHTML="";

current.forEach(num=>{

let row=document.createElement("div");

row.className="row";

row.innerHTML=`
<span>${num}</span>
<button onclick="copyNumber('${num}')">
📋 Copy
</button>
`;

result.appendChild(row);

});

document.getElementById("count")
.innerText="Total: "+current.length;

}

function removeCountryCode(){

current=getNumbers();

current=current.map(num=>{

num=num.replace(/^\+/,'');

for(let code of countryCodes){

if(num.startsWith(code)){
return num.slice(code.length);
}

}

return num;

});

render();

}

function addPlus(){

if(current.length===0)
current=getNumbers();

current=current.map(x=>
x.startsWith("+") ? x : "+"+x
);

render();

}

function removePlus(){

if(current.length===0)
current=getNumbers();

current=current.map(x=>
x.replace(/^\+/,'')
);

render();

}

function copyNumber(num){

navigator.clipboard.writeText(num);

alert("Copied: "+num);

}

function copyAll(){

navigator.clipboard.writeText(
current.join("\n")
);

alert("All copied");

}

</script>

</body>
</html>
